apiVersion: v1
kind: Secret
metadata:
  name: shared-postgres-secret
  namespace: wcr
  labels:
    app: shared-postgres
    component: database
type: Opaque
stringData:
  # ===========================================
  # POSTGRESQL ROOT CONFIGURATION
  # ===========================================
  # PostgreSQL superuser password
  POSTGRES_PASSWORD: "WCR_Postgres_Root_Pass_2024_Change_Me"
  
  # Default database (postgres is created by default)
  POSTGRES_USER: "postgres"
  POSTGRES_DB: "postgres"
  
  # ===========================================
  # APPLICATION DATABASE CREDENTIALS
  # ===========================================
  # NocoDB Database
  NOCODB_DB_NAME: "nocodb"
  NOCODB_DB_USER: "nocodb"
  NOCODB_DB_PASSWORD: "NocoDB_Postgres_Pass_2024_Change_Me"

