# ===========================================
# Novu Nginx Reverse Proxy Configuration
# ===========================================
#
# Installation:
# 1. Copy this file to /etc/nginx/sites-available/novu
# 2. Update server_name with your domain
# 3. Update SSL certificate paths
# 4. Enable site: sudo ln -s /etc/nginx/sites-available/novu /etc/nginx/sites-enabled/
# 5. Test config: sudo nginx -t
# 6. Reload Nginx: sudo systemctl reload nginx
#
# To get SSL certificate:
# sudo certbot --nginx -d novu.yourdomain.com
# ===========================================

upstream novu-api {
    server localhost:3000;
    keepalive 32;
}

upstream novu-ws {
    server localhost:3002;
    keepalive 32;
}

upstream novu-web {
    server localhost:4000;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name novu.yourdomain.com;
    
    # For Let's Encrypt certificate verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name novu.yourdomain.com;

    # ===========================================
    # SSL CONFIGURATION
    # ===========================================
    # Update these paths after running certbot
    ssl_certificate /etc/letsencrypt/live/novu.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/novu.yourdomain.com/privkey.pem;
    
    # SSL protocols and ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # SSL session cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # HSTS (Optional - uncomment after testing)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ===========================================
    # SECURITY HEADERS
    # ===========================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ===========================================
    # LOGGING
    # ===========================================
    access_log /var/log/nginx/novu_access.log;
    error_log /var/log/nginx/novu_error.log;

    # ===========================================
    # FILE UPLOAD SIZE
    # ===========================================
    client_max_body_size 100M;
    client_body_buffer_size 10M;

    # ===========================================
    # TIMEOUTS
    # ===========================================
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    proxy_read_timeout 600;
    send_timeout 600;

    # ===========================================
    # API ENDPOINTS (Must come before root)
    # ===========================================
    location ~ ^/(v1|v2|api)/ {
        proxy_pass http://novu-api;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Buffering
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # ===========================================
    # WEBSOCKET ENDPOINTS
    # ===========================================
    location ~ ^/(ws|socket.io)/ {
        proxy_pass http://novu-ws;
        proxy_http_version 1.1;
        
        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket timeouts (longer for persistent connections)
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        
        # Buffering off for WebSocket
        proxy_buffering off;
    }

    # ===========================================
    # WEB DASHBOARD (Must be last)
    # ===========================================
    location / {
        proxy_pass http://novu-web;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Caching
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # ===========================================
    # ERROR PAGES
    # ===========================================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}



