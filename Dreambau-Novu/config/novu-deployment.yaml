    component: ws
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: novu-web
  namespace: wcr
  labels:
    app: novu
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: novu
      component: web
  template:
    metadata:
      labels:
        app: novu
        component: web
    spec:
      containers:
      - name: web
        image: ghcr.io/novuhq/novu/dashboard:latest
        ports:
        - containerPort: 4000
          name: http
        env:
        - name: VITE_API_HOSTNAME
          value: "https://novu.dreambau.com"
        - name: VITE_WEBSOCKET_HOSTNAME
          value: "https://novu.dreambau.com"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: novu-web
  namespace: wcr
  labels:
    app: novu
    component: web
spec:
  type: ClusterIP
  ports:
  - port: 4000
    targetPort: 4000
    protocol: TCP
    name: http
  selector:
    app: novu
    component: web

