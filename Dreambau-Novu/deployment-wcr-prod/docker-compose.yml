version: '3.8'

services:
  # ==========================================
  # MONGODB DATABASE
  # ==========================================
  mongodb:
    image: mongo:8.0.3
    container_name: novu-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: novu
      MONGO_INITDB_ROOT_PASSWORD: Novu_WCR_Prod_Pass_2026_Secure
      PUID: 1000
      PGID: 1000
    volumes:
      - mongodb_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"  # Only accessible from localhost
    networks:
      - novu-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ==========================================
  # REDIS CACHE
  # ==========================================
  redis:
    image: redis:alpine
    container_name: novu-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"  # Only accessible from localhost
    networks:
      - novu-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ==========================================
  # NOVU API SERVICE
  # ==========================================
  novu-api:
    image: ghcr.io/novuhq/novu/api:latest
    container_name: novu-api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Security - CHANGE THESE IN PRODUCTION!
      JWT_SECRET: "wcr_prod_jwt_secret_change_me_2026_secure_random_key_here_64chars"
      STORE_ENCRYPTION_KEY: "wcr_prod_store_key_32_chars_x"
      NOVU_SECRET_KEY: "wcr_prod_novu_secret_change_me_2026_secure_random_key_here_64chars"
      SUBSCRIBER_WIDGET_JWT_EXPIRATION_TIME: "15d"
      
      # Host Configuration - Using IP:PORT (no domain)
      HOST_NAME: "http://135.220.37.192:3000"
      API_ROOT_URL: "http://135.220.37.192:3000"
      FRONT_BASE_URL: "http://135.220.37.192:4000"
      
      # Environment
      NODE_ENV: "production"
      
      # MongoDB
      MONGO_URL: "mongodb://novu:Novu_WCR_Prod_Pass_2026_Secure@mongodb:27017/novu-db?authSource=admin"
      MONGO_MAX_POOL_SIZE: "10"
      MONGO_MIN_POOL_SIZE: "5"
      MONGO_AUTO_CREATE_INDEXES: "true"
      
      # Redis
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB_INDEX: "2"
      REDIS_CACHE_SERVICE_HOST: "redis"
      REDIS_CACHE_SERVICE_PORT: "6379"
      DOCKER_REDIS_SERVICE_PORT: "6379"
      
      # S3 Storage (Local)
      S3_LOCAL_STACK: "http://localhost:4566"
      S3_BUCKET_NAME: "novu-local"
      S3_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      
      # API Configuration
      API_PORT: "3000"
      API_CONTEXT_PATH: ""
      IS_API_IDEMPOTENCY_ENABLED: "false"
      IS_API_RATE_LIMITING_ENABLED: "false"
      IS_NEW_MESSAGES_API_RESPONSE_ENABLED: "false"
      IS_V2_ENABLED: "false"
      
      # Monitoring (Optional)
      SENTRY_DSN: ""
      NEW_RELIC_ENABLED: "false"
    ports:
      - "3000:3000"  # API accessible on port 3000
    networks:
      - novu-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/v1/health-check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ==========================================
  # NOVU WORKER SERVICE
  # ==========================================
  novu-worker:
    image: ghcr.io/novuhq/novu/worker:latest
    container_name: novu-worker
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Security
      JWT_SECRET: "wcr_prod_jwt_secret_change_me_2026_secure_random_key_here_64chars"
      STORE_ENCRYPTION_KEY: "wcr_prod_store_key_32_chars_x"
      NOVU_SECRET_KEY: "wcr_prod_novu_secret_change_me_2026_secure_random_key_here_64chars"
      
      # Host Configuration
      HOST_NAME: "http://135.220.37.192:3000"
      API_ROOT_URL: "http://135.220.37.192:3000"
      FRONT_BASE_URL: "http://135.220.37.192:4000"
      
      # Environment
      NODE_ENV: "production"
      
      # MongoDB
      MONGO_URL: "mongodb://novu:Novu_WCR_Prod_Pass_2026_Secure@mongodb:27017/novu-db?authSource=admin"
      MONGO_MAX_POOL_SIZE: "10"
      MONGO_MIN_POOL_SIZE: "5"
      
      # Redis
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB_INDEX: "2"
      REDIS_CACHE_SERVICE_HOST: "redis"
      REDIS_CACHE_SERVICE_PORT: "6379"
      
      # S3 Storage
      S3_LOCAL_STACK: "http://localhost:4566"
      S3_BUCKET_NAME: "novu-local"
      S3_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
    networks:
      - novu-network

  # ==========================================
  # NOVU WEBSOCKET SERVICE
  # ==========================================
  novu-ws:
    image: ghcr.io/novuhq/novu/ws:latest
    container_name: novu-ws
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Security
      JWT_SECRET: "wcr_prod_jwt_secret_change_me_2026_secure_random_key_here_64chars"
      NOVU_SECRET_KEY: "wcr_prod_novu_secret_change_me_2026_secure_random_key_here_64chars"
      
      # Host Configuration
      HOST_NAME: "http://135.220.37.192:3002"
      
      # Environment
      NODE_ENV: "production"
      
      # MongoDB
      MONGO_URL: "mongodb://novu:Novu_WCR_Prod_Pass_2026_Secure@mongodb:27017/novu-db?authSource=admin"
      
      # Redis
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB_INDEX: "2"
      REDIS_CACHE_SERVICE_HOST: "redis"
      REDIS_CACHE_SERVICE_PORT: "6379"
      
      # WebSocket Port
      WS_PORT: "3002"
    ports:
      - "3002:3002"  # WebSocket accessible on port 3002
    networks:
      - novu-network

  # ==========================================
  # NOVU WEB DASHBOARD
  # ==========================================
  novu-web:
    image: ghcr.io/novuhq/novu/dashboard:latest
    container_name: novu-web
    restart: unless-stopped
    depends_on:
      - novu-api
    environment:
      # Configure to use IP:PORT
      VITE_API_HOSTNAME: "http://135.220.37.192:3000"
      VITE_WEBSOCKET_HOSTNAME: "http://135.220.37.192:3002"
    ports:
      - "4000:4000"  # Dashboard accessible on port 4000
    networks:
      - novu-network

# ==========================================
# VOLUMES
# ==========================================
volumes:
  mongodb_data:
    driver: local

# ==========================================
# NETWORKS
# ==========================================
networks:
  novu-network:
    driver: bridge



