apiVersion: apps/v1
kind: Deployment
metadata:
  name: testmails
  namespace: wcr
  labels: { app.kubernetes.io/name: testmails }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app.kubernetes.io/name: testmails }
  template:
    metadata:
      labels: { app.kubernetes.io/name: testmails }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: testmails
          image: dreambau-testmails:0.7.0-email-otp-20260720
          imagePullPolicy: Never
          ports:
            - { name: http, containerPort: 3000 }
          env:
            - { name: NODE_ENV, value: production }
            - { name: TESTMAILS_PASSWORD_HASH_FILE, value: /run/secrets/auth/password-hash }
            - { name: TESTMAILS_SESSION_SECRET_FILE, value: /run/secrets/auth/session-secret }
            - { name: TESTMAILS_EMAIL_OTP_HMAC_KEY_FILE, value: /run/secrets/email-otp/hmac-key }
            - { name: TESTMAILS_SMTP_HOST_FILE, value: /run/secrets/email-otp/smtp-host }
            - { name: TESTMAILS_SMTP_PORT_FILE, value: /run/secrets/email-otp/smtp-port }
            - { name: TESTMAILS_SMTP_USERNAME_FILE, value: /run/secrets/email-otp/smtp-username }
            - { name: TESTMAILS_SMTP_PASSWORD_FILE, value: /run/secrets/email-otp/smtp-password }
            - { name: TESTMAILS_SMTP_FROM_ADDRESS_FILE, value: /run/secrets/email-otp/smtp-from-address }
            - { name: TESTMAILS_SMTP_FROM_NAME, value: Dreambau Test Access }
            - { name: TEST_ACCESS_IDENTITIES_PATH, value: /run/secrets/test-access/machine-identities.json }
            - { name: TEST_ACCESS_PROVIDER, value: infisical }
            - { name: INFISICAL_BASE_URL, value: https://secrets.dreambau.com }
            - { name: INFISICAL_ORGANIZATION_SLUG, value: dreambau-test-access }
            - { name: INFISICAL_CLIENT_ID_FILE, value: /run/secrets/infisical/client-id }
            - { name: INFISICAL_CLIENT_SECRET_FILE, value: /run/secrets/infisical/client-secret }
            - { name: TEST_ACCESS_INFISICAL_ORISO_PROJECT_ID, value: 2808af88-2c60-4023-8754-98665192cfdf }
            - { name: TEST_ACCESS_INFISICAL_ORIMO_PROJECT_ID, value: cacf81e9-4d84-4352-99b8-4e3eb40bf338 }
            - { name: TEST_ACCESS_INFISICAL_DREAMBAU_PROJECT_ID, value: a7620a55-2f67-4bc1-9526-4efda230b247 }
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: accounts, mountPath: /run/secrets/testmails, readOnly: true }
            - { name: auth, mountPath: /run/secrets/auth, readOnly: true }
            - { name: test-access, mountPath: /run/secrets/test-access, readOnly: true }
            - { name: infisical, mountPath: /run/secrets/infisical, readOnly: true }
            - { name: email-otp, mountPath: /run/secrets/email-otp, readOnly: true }
            - { name: tmp, mountPath: /tmp }
          resources:
            requests: { cpu: 25m, memory: 96Mi }
            limits: { cpu: 500m, memory: 384Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          livenessProbe:
            httpGet: { path: /testmails/health/live, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /testmails/health/ready, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: testmails-data }
        - name: accounts
          secret: { secretName: testmails-accounts, defaultMode: 256 }
        - name: auth
          secret: { secretName: testmails-auth, defaultMode: 256 }
        - name: test-access
          secret: { secretName: test-access-identities, defaultMode: 256 }
        - name: infisical
          secret: { secretName: test-access-infisical, defaultMode: 256 }
        - name: email-otp
          secret: { secretName: testmails-email-otp, defaultMode: 256 }
        - name: tmp
          emptyDir: { sizeLimit: 32Mi }
