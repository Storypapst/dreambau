apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-proxy
  namespace: wcr
  labels:
    app: email-proxy
    component: smtp-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email-proxy
  template:
    metadata:
      labels:
        app: email-proxy
        component: smtp-bridge
    spec:
      containers:
      - name: email-proxy
        image: email-proxy:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: http
          protocol: TCP
        envFrom:
        - secretRef:
            name: email-proxy-secret
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: email-proxy
  namespace: wcr
  labels:
    app: email-proxy
    component: smtp-bridge
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: email-proxy

