apiVersion: v1
kind: Secret
metadata:
  name: cap-secret
  namespace: wcr
  labels:
    app: cap
    component: application
type: Opaque
stringData:
  # ===========================================
  # DATABASE CONNECTION - REQUIRED
  # ===========================================
  # Uses existing MySQL server in cluster
  DATABASE_URL: "mysql://cap:Cap_Pass_2024_Change_Me@mysql.wcr.svc.cluster.local:3306/cap?ssl={\"rejectUnauthorized\":false}"
  
  # Database encryption key (generate with: openssl rand -hex 32)
  DATABASE_ENCRYPTION_KEY: "REPLACE_WITH_GENERATED_ENCRYPTION_KEY"
  
  # ===========================================
  # APPLICATION CONFIGURATION - REQUIRED
  # ===========================================
  # Public URL (must match ingress)
  WEB_URL: "https://cap.dreambau.com"
  NEXTAUTH_URL: "https://cap.dreambau.com"
  
  # NextAuth secret (generate with: openssl rand -hex 32)
  NEXTAUTH_SECRET: "REPLACE_WITH_GENERATED_SECRET"
  
  # ===========================================
  # STORAGE CONFIGURATION - S3 Required for Cap
  # ===========================================
  # Using local filesystem as S3 endpoint (temporary - upgrade to Minio/S3 later)
  CAP_AWS_ACCESS_KEY: "local-storage-key"
  CAP_AWS_SECRET_KEY: "local-storage-secret"
  CAP_AWS_BUCKET: "cap-recordings"
  CAP_AWS_REGION: "us-east-1"
  S3_PUBLIC_ENDPOINT: "https://cap-s3.dreambau.com"
  S3_INTERNAL_ENDPOINT: "http://cap-minio.wcr.svc.cluster.local:9000"
  
  # ===========================================
  # APPLICATION SETTINGS
  # ===========================================
  # Node environment
  NODE_ENV: "production"
  
  # Port (internal)
  PORT: "3000"
  
  # Timezone
  TZ: "America/New_York"
  
  # ===========================================
  # EMAIL CONFIGURATION - Custom Resend Bridge
  # ===========================================
  # Resend API Key (fake - triggers email sending)
  RESEND_API_KEY: "re_custom_smtp_bridge"
  
  # Resend API Base URL (points to our custom SMTP bridge)
  RESEND_BASE_URL: "http://email-proxy.wcr.svc.cluster.local"
  
  # Email from address
  EMAIL_FROM: "Cap <verify@wcrbusiness.online>"

