apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: libretranslate-data-pvc
  namespace: wcr
  labels:
    app: libretranslate
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: libretranslate
  namespace: wcr
  labels:
    app: libretranslate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: libretranslate
  template:
    metadata:
      labels:
        app: libretranslate
    spec:
      initContainers:
        # Initialize the API keys DB on the PVC so it survives pod restarts.
        - name: init-api-keys
          image: python:3.11-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: API_KEYS_DB_PATH
              value: "/home/libretranslate/.local/api_keys.db"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: libretranslate-api-key
                  key: API_KEY
            # Per-minute request limit for this key (set high to effectively remove throttling).
            - name: REQ_LIMIT
              value: "1000000"
            # 0 = no char limit enforced by the API keys DB.
            - name: CHAR_LIMIT
              value: "0"
          command:
            - sh
            - -lc
            - |
              python - <<'PY'
              import os
              import sqlite3

              db_path = os.environ["API_KEYS_DB_PATH"]
              api_key = os.environ["API_KEY"].strip()
              req_limit = int(os.environ.get("REQ_LIMIT", "300"))
              char_limit = int(os.environ.get("CHAR_LIMIT", "0"))
              char_limit_db = None if char_limit == 0 else char_limit

              os.makedirs(os.path.dirname(db_path), exist_ok=True)
              conn = sqlite3.connect(db_path)
              create_sql = (
                  'CREATE TABLE IF NOT EXISTS api_keys ('
                  '"api_key"\tTEXT NOT NULL,'
                  '"req_limit"\tINTEGER NOT NULL,'
                  '"char_limit" INTEGER DEFAULT NULL,'
                  'PRIMARY KEY("api_key")'
                  ');'
              )

              # If an existing DB was created with a slightly different schema,
              # LibreTranslate may mis-detect the "char_limit" column and crash on startup.
              row = conn.execute(
                  "SELECT sql FROM sqlite_master WHERE type='table' AND name='api_keys';"
              ).fetchone()
              if row and ('\"char_limit\" INTEGER DEFAULT NULL' not in row[0]):
                  conn.execute("DROP TABLE api_keys;")

              conn.execute(create_sql)
              conn.execute(
                  "INSERT OR REPLACE INTO api_keys (api_key, req_limit, char_limit) VALUES (?, ?, ?)",
                  (api_key, req_limit, char_limit_db),
              )
              conn.commit()
              conn.close()
              print("api_keys_db_initialized")
              PY
          volumeMounts:
            - name: libretranslate-data
              mountPath: /home/libretranslate/.local
      containers:
        - name: libretranslate
          image: libretranslate/libretranslate:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: LT_HOST
              value: "0.0.0.0"
            - name: LT_PORT
              value: "5000"
            # Single-node cluster: keep model footprint reasonable.
            # Expand this list any time; each extra language adds model downloads + some RAM.
            - name: LT_LOAD_ONLY
              value: "en,es,fr,de,it,pt,hi,ar,ru,zh,ja,ko,nl,pl,tr"
            - name: LT_UPDATE_MODELS
              value: "false"
            - name: LT_API_KEYS
              value: "true"
            - name: LT_UNDER_ATTACK
              value: "false"
            # Enforce API key for all requests without enabling under-attack UI banner.
            - name: LT_REQUIRE_API_KEY_ORIGIN
              value: "a^"
            - name: LT_API_KEYS_DB_PATH
              value: "/home/libretranslate/.local/api_keys.db"
          volumeMounts:
            - name: libretranslate-data
              mountPath: /home/libretranslate/.local
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /languages
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /languages
              port: 5000
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: libretranslate-data
          persistentVolumeClaim:
            claimName: libretranslate-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: libretranslate
  namespace: wcr
  labels:
    app: libretranslate
spec:
  type: ClusterIP
  selector:
    app: libretranslate
  ports:
    - name: http
      port: 80
      targetPort: 5000
      protocol: TCP


