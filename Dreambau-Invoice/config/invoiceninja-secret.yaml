apiVersion: v1
kind: Secret
metadata:
  name: invoiceninja-secret
  namespace: wcr
type: Opaque
stringData:
  # Application Key - MUST generate with: openssl rand -base64 32
  # Then wrap with base64: prefix
  # Run: echo "base64:$(openssl rand -base64 32)"
  APP_KEY: "base64:6+cLglUenjzujq5sVx4WaTPpd5MPr5tiyVdeFKxtLE4="
  
  # Database Configuration
  DB_HOST: "mysql.wcr.svc.cluster.local"
  DB_PORT: "3306"
  DB_DATABASE: "ninja"
  DB_USERNAME: "ninja"
  # IMPORTANT: Must match MYSQL_PASSWORD in mysql-secret.yaml
  DB_PASSWORD: "WCR_Ninja_Pass_2024_Change_Me"
  
  # Application Configuration
  APP_URL: "https://invoice.dreambau.com"
  APP_ENV: "production"
  APP_DEBUG: "false"
  
  # Mail Configuration - Configure according to your SMTP provider
  MAIL_MAILER: "smtp"
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "587"
  MAIL_USERNAME: "your-email@gmail.com"
  MAIL_PASSWORD: "your-app-password"
  MAIL_ENCRYPTION: "tls"
  MAIL_FROM_ADDRESS: "noreply@invoice.dreambau.com"
  MAIL_FROM_NAME: "Dreambau"
  
  # Additional Settings
  REQUIRE_HTTPS: "true"
  TRUSTED_PROXIES: "*"
  PHANTOMJS_PDF_GENERATION: "false"
  PDF_GENERATOR: "snappdf"
  VIEW_COMPILED_PATH: "/var/www/app/storage/framework/views"

