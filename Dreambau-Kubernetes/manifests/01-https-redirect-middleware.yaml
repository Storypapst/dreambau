apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wcr-redirect-https
  namespace: wcr
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: wcr-nocodb-headers
  namespace: wcr
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
      X-Forwarded-Host: "nocodb.wcrbusiness.online"
    customResponseHeaders:
      X-Frame-Options: "SAMEORIGIN"
      X-Content-Type-Options: "nosniff"
      Referrer-Policy: "strict-origin-when-cross-origin"
---
