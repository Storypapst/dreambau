apiVersion: v1
kind: Secret
metadata:
  name: nocodb-secret
  namespace: wcr
  labels:
    app: nocodb
    component: application
type: Opaque
stringData:
  # ===========================================
  # DATABASE CONNECTION - REQUIRED
  # ===========================================
  # Uses shared PostgreSQL server in cluster
  # Format: pg://host:port?u=username&p=password&d=database
  NC_DB: "pg://shared-postgres.wcr.svc.cluster.local:5432?u=nocodb&p=NocoDB_Postgres_Pass_2024_Change_Me&d=nocodb"
  
  # Database credentials (for management scripts)
  DB_HOST: "shared-postgres.wcr.svc.cluster.local"
  DB_PORT: "5432"
  DB_DATABASE: "nocodb"
  DB_USER: "nocodb"
  DB_PASSWORD: "NocoDB_Postgres_Pass_2024_Change_Me"
  DB_TYPE: "pg"
  
  # ===========================================
  # APPLICATION CONFIGURATION - REQUIRED
  # ===========================================
  # Public URL (must match ingress)
  NC_PUBLIC_URL: "https://nocodb.dreambau.com"
  
  # Authentication secret (generate with: openssl rand -base64 32)
  NC_AUTH_JWT_SECRET: "M3mi97aOzVKIygWGZ7V2pnhkbabO7Kzgym0n1ldhTbs="
  
  # ===========================================
  # ADMIN CONFIGURATION - REMOVED
  # ===========================================
  # NOTE: NC_ADMIN_EMAIL and NC_ADMIN_PASSWORD are NOT set here
  # to prevent NocoDB from resetting the admin account on restart.
  # Admin account is managed directly in the database.
  
  # ===========================================
  # OPTIONAL CONFIGURATION
  # ===========================================
  # Disable telemetry (recommended for privacy)
  NC_DISABLE_TELE: "true"
  
  # Enable public signup (false = invite-only)
  NC_INVITE_ONLY_SIGNUP: "true"
  
  # Request size limits
  NC_REQUEST_BODY_SIZE: "104857600"
  
  # Timezone
  TZ: "America/New_York"
  
  # ===========================================
  # SMTP CONFIGURATION - FOR EMAIL NOTIFICATIONS
  # ===========================================
  # SMTP server for sending invitation emails and notifications
  NC_MAILER_HOST: "smtp.titan.email"
  NC_MAILER_PORT: "587"
  NC_MAILER_SECURE: "false"
  NC_MAILER_USER: "verify@wcrbusiness.online"
  NC_MAILER_PASSWORD: "h%=3-Ak]N;0<K6]"
  NC_MAILER_FROM: "NocoDB <verify@wcrbusiness.online>"

