apiVersion: v1
kind: Secret
metadata:
  name: n8n-secret
  namespace: wcr
type: Opaque
stringData:
  # ===========================================
  # N8N CONFIGURATION - REQUIRED
  # ===========================================
  # Your n8n domain (must match ingress)
  N8N_HOST: "n8n.dreambau.com"
  
  # Webhook URL (same as host)
  WEBHOOK_URL: "https://n8n.dreambau.com"
  
  # Protocol (https for production)
  N8N_PROTOCOL: "https"
  
  # Port (internal container port)
  N8N_PORT: "5678"
  
  # ===========================================
  # DATABASE CONFIGURATION - REQUIRED
  # ===========================================
  # Using PostgreSQL for better performance
  DB_TYPE: "postgresdb"
  DB_POSTGRESDB_HOST: "n8n-postgres.wcr.svc.cluster.local"
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_DATABASE: "n8n"
  DB_POSTGRESDB_USER: "n8n"
  # Generate with: openssl rand -base64 32
  DB_POSTGRESDB_PASSWORD: "N8N_Postgres_Pass_2024_Change_Me"
  
  # ===========================================
  # ENCRYPTION KEY - REQUIRED
  # ===========================================
  # Generate with: openssl rand -base64 32
  # IMPORTANT: Never change this after first deployment or you'll lose encrypted credentials!
  N8N_ENCRYPTION_KEY: "WKp9bDGXbVHnXaErfYwo9OtH9aqM99xyyRxyNgUnhm4="
  
  # ===========================================
  # BASIC AUTH (Optional - for extra security)
  # ===========================================
  # Uncomment to enable basic auth on top of n8n login
  # N8N_BASIC_AUTH_ACTIVE: "true"
  # N8N_BASIC_AUTH_USER: "admin"
  # N8N_BASIC_AUTH_PASSWORD: "your-basic-auth-password"
  
  # ===========================================
  # TIMEZONE & LOCALE
  # ===========================================
  GENERIC_TIMEZONE: "America/New_York"
  TZ: "America/New_York"
  
  # ===========================================
  # EXECUTIONS & PERFORMANCE
  # ===========================================
  # Save execution data
  EXECUTIONS_DATA_SAVE_ON_SUCCESS: "all"
  EXECUTIONS_DATA_SAVE_ON_ERROR: "all"
  EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"
  
  # Execution timeout (in seconds)
  EXECUTIONS_TIMEOUT: "3600"
  
  # Max execution timeout
  EXECUTIONS_TIMEOUT_MAX: "7200"
  
  # ===========================================
  # SMTP EMAIL (Optional - for notifications)
  # ===========================================
  # N8N_EMAIL_MODE: "smtp"
  # N8N_SMTP_HOST: "smtp.gmail.com"
  # N8N_SMTP_PORT: "587"
  # N8N_SMTP_USER: "your-email@gmail.com"
  # N8N_SMTP_PASS: "your-app-password"
  # N8N_SMTP_SENDER: "n8n@wcrbusiness.online"

