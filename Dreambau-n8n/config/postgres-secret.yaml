apiVersion: v1
kind: Secret
metadata:
  name: n8n-postgres-secret
  namespace: wcr
type: Opaque
stringData:
  # ===========================================
  # POSTGRESQL CONFIGURATION
  # ===========================================
  POSTGRES_DB: "n8n"
  POSTGRES_USER: "n8n"
  # IMPORTANT: Must match DB_POSTGRESDB_PASSWORD in n8n-secret.yaml
  # Generate with: openssl rand -base64 32
  POSTGRES_PASSWORD: "N8N_Postgres_Pass_2024_Change_Me"

